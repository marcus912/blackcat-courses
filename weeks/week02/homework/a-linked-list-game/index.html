<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cache Crash — LRU Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1>Cache Crash</h1>
    <p class="subtitle">A live LRU cache. Click any key — watch <code>get</code> reorder, <code>put</code> evict.</p>

    <div class="hud">
      <div><span class="label">Hits</span><span class="value" id="hits">0</span></div>
      <div><span class="label">Misses</span><span class="value" id="misses">0</span></div>
      <div><span class="label">Hit rate</span><span class="value" id="rate">—</span></div>
    </div>

    <div class="section-label">Request a key</div>
    <div class="keys" id="keys"></div>

    <div class="section-label">Cache (capacity 4) <span class="muted">— MRU left, LRU right</span></div>
    <div class="slots" id="slots"></div>
    <div class="legend">
      <span class="mru-tag">◀ MRU (just used)</span>
      <span class="lru-tag">LRU (next to evict) ▶</span>
    </div>

    <div class="controls">
      <button id="reset-btn">Reset</button>
      <span id="message">Click a key to issue a request.</span>
    </div>

    <footer>
      Built on a doubly linked list + hash map. See
      <a href="./lru.js">lru.js</a> ·
      <a href="./README.md">notes</a>
    </footer>
  </div>

  <script type="module" src="./game.js"></script>
</body>
</html>
